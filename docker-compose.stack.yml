services:
  invenicum:
    image: ghcr.io/lopiv2/invenicum:latest
    container_name: invenicum
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

      # External database (MariaDB/MySQL)
      DB_HOST: 192.168.1.100
      DB_PORT: 3306
      DB_USER: invenicum_user
      DB_PASSWORD: change_this_password
      DB_NAME: invenicum
      DATABASE_URL: mysql://invenicum_user:change_this_password@192.168.1.100:3306/invenicum

      # JWT security (change to a long unique value)
      JWT_SECRET: change_this_jwt_secret
      JWT_EXPIRES_IN: 24h

      # Upload folder
      UPLOAD_FOLDER: uploads/inventory

      # GitHub OAuth (optional, leave empty if not used)
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""

      # Minimum supported client app version
      MIN_SUPPORTED_APP_VERSION: 0.0.0
    volumes:
      - uploads_data:/app/uploads/inventory

volumes:
  uploads_data:
