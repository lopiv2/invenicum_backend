services:
  invenicum:
    build:
      context: .
      dockerfile: Dockerfile.selfhosted
      additional_contexts:
        frontend: ../Invenicum/invenicum
      args:
        API_URL: ${FRONTEND_API_URL:-/api/v1}
        APP_VERSION: ${APP_VERSION:-0.0.0}
    image: invenicum/invenicum:${APP_VERSION:-local}
    container_name: invenicum
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production

      # Base de datos externa (ej: Laragon en host Windows)
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
      DB_PORT: ${DOCKER_DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@${DOCKER_DB_HOST:-host.docker.internal}:${DOCKER_DB_PORT:-3306}/${DB_NAME}

      PORT: ${PORT:-3000}
      BASE_URL: ${BASE_URL}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-uploads/inventory}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      MIN_SUPPORTED_APP_VERSION: ${MIN_SUPPORTED_APP_VERSION:-0.0.0}
    volumes:
      - uploads_data:/app/uploads/inventory

volumes:
  uploads_data:
