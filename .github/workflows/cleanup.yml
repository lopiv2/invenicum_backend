name: Cleanup Untagged Packages
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  delete-untagged:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete SHA-only package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = "lopiv2";
            const package_name = "invenicum";

            // Lista todos los paquetes del usuario para verificar el nombre exacto
            const pkgList = await github.rest.packages.listPackagesForUser({
              username,
              package_type: "container",
            });
            console.log("Paquetes encontrados:", pkgList.data.map(p => p.name));

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: "container",
                package_name,
                username,
                per_page: 100,
              }
            );

            console.log(`Total de versiones encontradas: ${versions.length}`);

            for (const version of versions) {
              const tags = version.metadata?.container?.tags || [];
              const hasSemver = tags.some(t => /^v?\d+\.\d+\.\d+/.test(t));
              const hasShaOnly = tags.length > 0 && tags.every(t => t.startsWith("sha-"));

              console.log(`Version ${version.id} | tags: [${tags.join(", ")}] | hasSemver: ${hasSemver} | hasShaOnly: ${hasShaOnly}`);

              if (!hasSemver && hasShaOnly) {
                console.log(`  → Eliminando versión ${version.id}`);
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: "container",
                  package_name,
                  username,
                  package_version_id: version.id,
                });
              }
            }
