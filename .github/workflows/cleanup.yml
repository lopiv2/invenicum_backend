name: Cleanup Untagged Packages
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  delete-untagged:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete SHA-only package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.Invenicum_docker }}
          script: |
            const package_name = "invenicum";

            // Paginación manual para evitar que octokit resuelva el endpoint incorrecto
            let page = 1;
            let allVersions = [];

            while (true) {
              const response = await github.request(
                "GET /user/packages/{package_type}/{package_name}/versions",
                {
                  package_type: "container",
                  package_name,
                  per_page: 100,
                  page,
                }
              );

              const batch = response.data;
              console.log(`Página ${page}: ${batch.length} versiones`);

              if (batch.length === 0) break;
              allVersions = allVersions.concat(batch);
              if (batch.length < 100) break;
              page++;
            }

            console.log(`Total versiones encontradas: ${allVersions.length}`);

            for (const version of allVersions) {
              const tags = version.metadata?.container?.tags || [];
              const hasSemver = tags.some(t => /^v?\d+\.\d+\.\d+/.test(t));
              const hasShaOnly = tags.length > 0 && tags.every(t => t.startsWith("sha-"));

              console.log(`Version ${version.id} | tags: [${tags.join(", ")}] | hasSemver: ${hasSemver} | hasShaOnly: ${hasShaOnly}`);

              if (!hasSemver && hasShaOnly) {
                console.log(`  → Eliminando versión ${version.id}`);
                await github.request(
                  "DELETE /user/packages/{package_type}/{package_name}/versions/{package_version_id}",
                  {
                    package_type: "container",
                    package_name,
                    package_version_id: version.id,
                  }
                );
              }
            }
