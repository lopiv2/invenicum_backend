name: Cleanup Untagged Packages
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  delete-untagged:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete SHA-only package versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_PACKAGES }}
          script: |
            const org = "lopiv2";
            const package_name = "invenicum";

            // GET funciona con /user/ pero DELETE necesita el contexto de org
            let page = 1;
            let allVersions = [];

            while (true) {
              const response = await github.request(
                "GET /user/packages/{package_type}/{package_name}/versions",
                {
                  package_type: "container",
                  package_name,
                  per_page: 100,
                  page,
                }
              );

              const batch = response.data;
              console.log(`Página ${page}: ${batch.length} versiones`);
              if (batch.length === 0) break;
              allVersions = allVersions.concat(batch);
              if (batch.length < 100) break;
              page++;
            }

            console.log(`Total versiones encontradas: ${allVersions.length}`);

            let deleted = 0;
            let skipped = 0;
            let errors = 0;

            for (const version of allVersions) {
              const tags = version.metadata?.container?.tags || [];
              const hasSemver = tags.some(t => /^v?\d+\.\d+\.\d+/.test(t));
              const hasShaOnly = tags.length > 0 && tags.every(t => t.startsWith("sha-"));

              console.log(`Version ${version.id} | tags: [${tags.join(", ")}] | hasSemver: ${hasSemver} | hasShaOnly: ${hasShaOnly}`);

              if (!hasSemver && hasShaOnly) {
                try {
                  // DELETE con endpoint de org, que es donde realmente vive el paquete
                  await github.request(
                    "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                    {
                      org,
                      package_type: "container",
                      package_name,
                      package_version_id: version.id,
                    }
                  );
                  console.log(`  ✅ Eliminada versión ${version.id}`);
                  deleted++;
                } catch (err) {
                  console.log(`  ❌ Error eliminando ${version.id}: ${err.message}`);
                  errors++;
                }
              } else {
                skipped++;
              }
            }

            console.log(`\n📊 Resumen: ${deleted} eliminadas | ${skipped} conservadas | ${errors} errores`);
