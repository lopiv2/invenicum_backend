name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version description"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/lopiv2/invenicum
      FRONTEND_REPOSITORY: lopiv2/Invenicum
      FRONTEND_REF: main
      FRONTEND_SUBPATH: invenicum

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ env.FRONTEND_REF }}
          path: frontend-src
          # Si FRONTEND_REPO_TOKEN existe, se usa; si no, usa el token por defecto.
          token: ${{ secrets.FRONTEND_REPO_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          APP_VERSION="$SHORT_SHA"

          TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            APP_VERSION="$INPUT_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_VERSION}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            APP_VERSION="$TAG_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${TAG_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend build context
        id: frontend
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATE_SUBPATH="./frontend-src/${FRONTEND_SUBPATH}"
          CANDIDATE_ROOT="./frontend-src"

          if [[ -f "${CANDIDATE_SUBPATH}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_SUBPATH}"
          elif [[ -f "${CANDIDATE_ROOT}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_ROOT}"
          else
            echo "No se encontro pubspec.yaml en frontend-src ni frontend-src/${FRONTEND_SUBPATH}" >&2
            find ./frontend-src -maxdepth 3 -type f -name pubspec.yaml || true
            exit 1
          fi

          echo "path=${FRONTEND_PATH}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-contexts: |
            frontend=${{ steps.frontend.outputs.path }}
          build-args: |
            API_URL=/api/v1
            APP_VERSION=${{ steps.vars.outputs.app_version }}

      - name: Create Release in frontend repo
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FRONTEND_RELEASE_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = 'lopiv2';
            const repo = 'invenicum';
            const desiredSha = context.sha;

            async function resolveTargetSha() {
              try {
                await github.rest.git.getCommit({ owner, repo, commit_sha: desiredSha });
                return desiredSha;
              } catch (e) {
                const branch = process.env.FRONTEND_REF || 'main';
                const resp = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
                return resp.data.object.sha;
              }
            }

            try {
              const targetSha = await resolveTargetSha();
              // Create or update a release; createRelease will create tag if needed
              try {
                const release = await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  target_commitish: targetSha,
                  name: `${tag} - Release synched from backend`,
                  body: `Automated release created from backend repository tag ${tag}.`,
                  draft: false,
                  prerelease: false,
                });
                console.log(`Release created: ${release.data.html_url}`);
              } catch (createError) {
                if (createError.status === 422) {
                  // Release already exists. Update it.
                  const releases = await github.rest.repos.listReleases({ owner, repo });
                  const existing = releases.data.find(r => r.tag_name === tag);
                  if (existing) {
                    await github.rest.repos.updateRelease({ owner, repo, release_id: existing.id, tag_name: tag, target_commitish: targetSha, name: `${tag} - Release synched from backend`, body: `Updated automated release.` });
                    console.log(`Release updated for tag ${tag}`);
                  } else {
                    throw createError;
                  }
                } else {
                  throw createError;
                }
              }
            } catch (error) {
              core.setFailed && core.setFailed(error.message || String(error));
              throw error;
            }
