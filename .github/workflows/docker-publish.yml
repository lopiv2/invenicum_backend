name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version semantica opcional (ej: 1.2.3)"
        required: false
        type: string
      release_name:
        description: "Nombre humano para el release (solo para workflow_dispatch)"
        required: false
        type: string
      skip_build:
        description: "Si 'true', omite el paso de build/push para pruebas"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/lopiv2/invenicum
      FRONTEND_REPOSITORY: lopiv2/Invenicum
      FRONTEND_REF: main
      FRONTEND_SUBPATH: invenicum

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Create backend tag (if requested)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.payload.inputs.version;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const fullRef = `refs/tags/${tag}`;
            try {
              await github.rest.git.createRef({ owner, repo, ref: fullRef, sha });
              console.log(`Tag ${tag} created in ${owner}/${repo}`);
            } catch (error) {
              if (error.status === 422) {
                await github.rest.git.updateRef({ owner, repo, ref: `tags/${tag}`, sha, force: true });
                console.log(`Tag ${tag} updated in ${owner}/${repo}`);
              } else {
                throw error;
              }
            }

      - name: Set frontend ref
        id: set_frontend_ref
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "frontend_ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"

          # comprobar si existe en frontend repo
            if git ls-remote --exit-code --heads https://github.com/${FRONTEND_REPOSITORY}.git "$BRANCH" > /dev/null 2>&1; then
              echo "frontend_ref=$BRANCH" >> "$GITHUB_OUTPUT"
            else
              echo "frontend_ref=${FRONTEND_REF}" >> "$GITHUB_OUTPUT"
            fi

          else
            echo "frontend_ref=${FRONTEND_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ steps.set_frontend_ref.outputs.frontend_ref }}
          path: frontend-src
          # Si FRONTEND_REPO_TOKEN existe, se usa; si no, usa el token por defecto.
          token: ${{ secrets.FRONTEND_RELEASE_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          
          # 1. Prioridad de Versión: Input > Tag > SHA
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW_VERSION="${GITHUB_REF#refs/tags/}"
          else
            RAW_VERSION="sha-${SHORT_SHA}"
          fi

          # Normalizar: quitar 'v' inicial si existe (v1.1.0-beta.1 -> 1.1.0-beta.1)
          APP_VERSION="${RAW_VERSION#v}"
          
          # 2. Inicializar TAGS con la versión específica y el SHA
          TAGS="${IMAGE_NAME}:${APP_VERSION},${IMAGE_NAME}:sha-${SHORT_SHA}"

          # 3. Lógica de etiquetas flotantes (EL CAMBIO IMPORTANTE AQUÍ)
          if [[ "$APP_VERSION" == *"beta"* ]]; then
            # Es una beta: Solo actualizamos el tag :beta
            TAGS="${TAGS},${IMAGE_NAME}:beta"
            echo "MODO: Beta detectada. No se tocará la etiqueta :latest"
          else
            # NO es una beta: Es una versión estable
            TAGS="${TAGS},${IMAGE_NAME}:latest"
            echo "MODO: Versión estable detectada. Actualizando :latest"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend build context
        id: frontend
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATE_SUBPATH="./frontend-src/${FRONTEND_SUBPATH}"
          CANDIDATE_ROOT="./frontend-src"

          if [[ -f "${CANDIDATE_SUBPATH}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_SUBPATH}"
          elif [[ -f "${CANDIDATE_ROOT}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_ROOT}"
          else
            echo "No se encontro pubspec.yaml en frontend-src ni frontend-src/${FRONTEND_SUBPATH}" >&2
            find ./frontend-src -maxdepth 3 -type f -name pubspec.yaml || true
            exit 1
          fi

          echo "path=${FRONTEND_PATH}" >> "$GITHUB_OUTPUT"

      - name: Get frontend SHA
        id: frontend_sha
        shell: bash
        run: |
          set -euo pipefail
          if [ -d frontend-src ]; then
            SHA=$(git -C frontend-src rev-parse HEAD)
            echo "frontend_sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "Exported frontend_sha=$SHA"
          else
            echo "frontend_sha=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GIT_TERMINAL_PROMPT: "0"

      - name: Build and push
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-contexts: |
            frontend=${{ steps.frontend.outputs.path }}
          build-args: |
            API_URL=/api/v1
            APP_VERSION=${{ steps.vars.outputs.app_version }}

      - name: Sync version tag to frontend repo
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        uses: actions/github-script@v7
        env:
          FRONTEND_SHA: ${{ steps.frontend_sha.outputs.frontend_sha }}
        with:
          github-token: ${{ secrets.FRONTEND_RELEASE_TOKEN }}
          script: |
            const tag = (context.ref && context.ref.startsWith('refs/tags/')) ? context.ref.replace('refs/tags/', '') : context.payload.inputs.version;
            const owner = 'lopiv2';
            const repo = 'Invenicum';
            const sha = process.env.FRONTEND_SHA || context.sha;
            const ref = `refs/tags/${tag}`;

            try {
              await github.rest.git.createRef({ owner, repo, ref, sha });
              console.log(`Tag ${tag} created in ${owner}/${repo}`);
            } catch (error) {
              if (error.status === 422) {
                await github.rest.git.updateRef({ owner, repo, ref: `tags/${tag}`, sha, force: true });
                console.log(`Tag ${tag} updated in ${owner}/${repo}`);
              } else {
                throw error;
              }
            }

            // Use provided release name (for workflow_dispatch) or fall back to tag
            const providedName = context.payload && context.payload.inputs && context.payload.inputs.release_name ? context.payload.inputs.release_name : null;
            const releaseTitle = providedName && providedName.trim().length > 0 ? providedName.trim() : tag;

            try {
              const imageUrl = `https://ghcr.io/lopiv2/invenicum:${tag}`;
              const imageInfo = `Docker image: ${imageUrl}\n\nPull with:\n\tdocker pull ${imageUrl}`;
              let release;
              try {
                release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
                const oldBody = release.body || '';
                const bodyHasImage = oldBody.includes(imageUrl) || oldBody.includes(`docker pull ${imageUrl}`);
                const newBody = bodyHasImage ? oldBody : (oldBody + "\n\n" + imageInfo).trim();
                const isPrerelease = tag.includes('beta') || tag.includes('alpha') || tag.includes('rc');
                
                if (release.draft === true) {
                  // Publish the draft but preserve/append body
                  await github.rest.repos.updateRelease({ owner, repo, release_id: release.id, name: releaseTitle, body: newBody, draft: false, prerelease: isPrerelease });
                  console.log(`Draft release ${tag} published in ${owner}/${repo} with title: ${releaseTitle}`);
                } else {
                  // Already published: update body by appending image info if missing
                  await github.rest.repos.updateRelease({ owner, repo, release_id: release.id, name: releaseTitle, body: newBody });
                  console.log(`Release ${tag} updated in ${owner}/${repo} with title: ${releaseTitle}`);
                }
              } catch (errGet) {
                if (errGet.status === 404) {
                  // No release exists: create a published release with image info
                  await github.rest.repos.createRelease({ owner, repo, tag_name: tag, name: releaseTitle, body: imageInfo, draft: false, prerelease: isPrerelease, generate_release_notes: true });
                  console.log(`Release ${tag} created in ${owner}/${repo} with title: ${releaseTitle}`);
                } else {
                  throw errGet;
                }
              }
            } catch (err) {
              console.warn('Failed to create/update release in frontend:', err);
            }
