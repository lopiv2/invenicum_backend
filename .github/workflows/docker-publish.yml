name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version semantica opcional (ej: 1.2.3)"
        required: false
        type: string
      release_name:
        description: "Nombre humano para el release (solo para workflow_dispatch)"
        required: false
        type: string
      skip_build:
        description: "Si 'true', omite el paso de build/push para pruebas"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/lopiv2/invenicum
      FRONTEND_REPOSITORY: lopiv2/Invenicum
      FRONTEND_REF: main
      FRONTEND_SUBPATH: invenicum

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create backend tag (if requested)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.payload.inputs.version;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const fullRef = `refs/tags/${tag}`;
            try {
              await github.rest.git.createRef({ owner, repo, ref: fullRef, sha });
              console.log(`Tag ${tag} created in ${owner}/${repo}`);
            } catch (error) {
              if (error.status === 422) {
                await github.rest.git.updateRef({ owner, repo, ref: `tags/${tag}`, sha, force: true });
                console.log(`Tag ${tag} updated in ${owner}/${repo}`);
              } else {
                throw error;
              }
            }

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ env.FRONTEND_REF }}
          path: frontend-src
          # Si FRONTEND_REPO_TOKEN existe, se usa; si no, usa el token por defecto.
          token: ${{ secrets.FRONTEND_RELEASE_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          APP_VERSION="$SHORT_SHA"

          TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            APP_VERSION="$INPUT_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_VERSION}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            APP_VERSION="$TAG_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${TAG_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend build context
        id: frontend
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATE_SUBPATH="./frontend-src/${FRONTEND_SUBPATH}"
          CANDIDATE_ROOT="./frontend-src"

          if [[ -f "${CANDIDATE_SUBPATH}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_SUBPATH}"
          elif [[ -f "${CANDIDATE_ROOT}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_ROOT}"
          else
            echo "No se encontro pubspec.yaml en frontend-src ni frontend-src/${FRONTEND_SUBPATH}" >&2
            find ./frontend-src -maxdepth 3 -type f -name pubspec.yaml || true
            exit 1
          fi

          echo "path=${FRONTEND_PATH}" >> "$GITHUB_OUTPUT"

      - name: Get frontend SHA
        id: frontend_sha
        shell: bash
        run: |
          set -euo pipefail
          if [ -d frontend-src ]; then
            SHA=$(git -C frontend-src rev-parse HEAD)
            echo "frontend_sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "Exported frontend_sha=$SHA"
          else
            echo "frontend_sha=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GIT_TERMINAL_PROMPT: '0'

      - name: Build and push
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-contexts: |
            frontend=${{ steps.frontend.outputs.path }}
          build-args: |
            API_URL=/api/v1
            APP_VERSION=${{ steps.vars.outputs.app_version }}

      - name: Sync version tag to frontend repo
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
        uses: actions/github-script@v7
        env:
          FRONTEND_SHA: ${{ steps.frontend_sha.outputs.frontend_sha }}
        with:
          github-token: ${{ secrets.FRONTEND_RELEASE_TOKEN }}
          script: |
            const tag = (context.ref && context.ref.startsWith('refs/tags/')) ? context.ref.replace('refs/tags/', '') : context.payload.inputs.version;
            const owner = 'lopiv2';
            const repo = 'Invenicum';
            const sha = process.env.FRONTEND_SHA || context.sha;
            const ref = `refs/tags/${tag}`;

            try {
              await github.rest.git.createRef({ owner, repo, ref, sha });
              console.log(`Tag ${tag} created in ${owner}/${repo}`);
            } catch (error) {
              if (error.status === 422) {
                await github.rest.git.updateRef({ owner, repo, ref: `tags/${tag}`, sha, force: true });
                console.log(`Tag ${tag} updated in ${owner}/${repo}`);
              } else {
                throw error;
              }
            }

            // Use provided release name (for workflow_dispatch) or fall back to tag
            const providedName = context.payload && context.payload.inputs && context.payload.inputs.release_name ? context.payload.inputs.release_name : null;
            const releaseTitle = providedName && providedName.trim().length > 0 ? providedName.trim() : tag;

            try {
              const imageUrl = `https://ghcr.io/lopiv2/invenicum:${tag}`;
              let release;
              try {
                release = (await github.rest.repos.getReleaseByTag({ owner, repo, tag })).data;
                await github.rest.repos.updateRelease({ owner, repo, release_id: release.id, name: releaseTitle, body: `Docker image: ${imageUrl}\n\nPull with:\n\tdocker pull ${imageUrl}` });
                console.log(`Release ${tag} updated in ${owner}/${repo} with title: ${releaseTitle}`);
              } catch (errGet) {
                if (errGet.status === 404) {
                  await github.rest.repos.createRelease({ owner, repo, tag_name: tag, name: releaseTitle, body: `Docker image: ${imageUrl}\n\nPull with:\n\tdocker pull ${imageUrl}`, draft: false, prerelease: false });
                  console.log(`Release ${tag} created in ${owner}/${repo} with title: ${releaseTitle}`);
                } else {
                  throw errGet;
                }
              }
            } catch (err) {
              console.warn('Failed to create/update release in frontend:', err);
            }
