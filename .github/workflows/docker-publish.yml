name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version semantica opcional (ej: 1.2.3)"
        required: false
        type: string
      skip_build:
        description: "Si 'true', omite el paso de build/push para pruebas"
        required: false
        type: string

permissions:
            const owner = 'lopiv2';
            const repo = 'Invenicum';

            // Determinar el tag: preferir push de tag, si no usar el input 'version' en workflow_dispatch
            let tag = null;
            if (context.ref && context.ref.startsWith('refs/tags/')) {
              tag = context.ref.replace('refs/tags/', '');
            } else if (context.payload && context.payload.inputs && context.payload.inputs.version) {
              tag = context.payload.inputs.version;
            }

            if (!tag) {
              throw new Error('No se encontró un tag. Ejecuta el workflow desde un push de tag o proporciona `version` en inputs.');
            }

            // Para crear el tag en el repo frontend necesitamos un SHA que exista en ese repo.
            // Obtenemos el SHA de la rama objetivo del frontend (`main` por defecto).
            let sha = null;
            try {
              const targetBranch = '${{ env.FRONTEND_REF }}' || 'main';
              const refRes = await github.rest.git.getRef({ owner, repo, ref: `heads/${targetBranch}` });
              sha = refRes.data.object.sha;
              console.log(`Using ${owner}/${repo}@${targetBranch} sha=${sha} to create tag ${tag}`);
            } catch (err) {
              // Fallback: usar context.sha (menos fiable si proviene del backend repo)
              console.warn('No se pudo obtener la ref del frontend; usando context.sha como fallback');
              sha = context.sha;
            }

            const fullRef = `refs/tags/${tag}`;
            const refForUpdate = `tags/${tag}`;

            try {
              await github.rest.git.createRef({ owner, repo, ref: fullRef, sha });
              console.log(`Tag ${tag} created in ${owner}/${repo}`);
            } catch (error) {
              if (error.status === 422) {
                // ref already exists -> update it (API expects ref without leading 'refs/')
                await github.rest.git.updateRef({ owner, repo, ref: refForUpdate, sha, force: true });
                console.log(`Tag ${tag} updated in ${owner}/${repo}`);
              } else {
                throw error;
              }
            }
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          APP_VERSION="$SHORT_SHA"

          TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            APP_VERSION="$INPUT_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_VERSION}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            APP_VERSION="$TAG_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${TAG_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend build context
        id: frontend
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATE_SUBPATH="./frontend-src/${FRONTEND_SUBPATH}"
          CANDIDATE_ROOT="./frontend-src"

          if [[ -f "${CANDIDATE_SUBPATH}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_SUBPATH}"
          elif [[ -f "${CANDIDATE_ROOT}/pubspec.yaml" ]]; then
            FRONTEND_PATH="${CANDIDATE_ROOT}"
          else
            echo "No se encontro pubspec.yaml en frontend-src ni frontend-src/${FRONTEND_SUBPATH}" >&2
            find ./frontend-src -maxdepth 3 -type f -name pubspec.yaml || true
            exit 1
          fi

          echo "path=${FRONTEND_PATH}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-contexts: |
            frontend=${{ steps.frontend.outputs.path }}
          build-args: |
            API_URL=/api/v1
            APP_VERSION=${{ steps.vars.outputs.app_version }}

      - name: Sync version tag to frontend repo
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FRONTEND_RELEASE_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const owner = 'lopiv2';
            const repo = 'Invenicum';
            const sha = context.sha;
            const ref = `refs/tags/${tag}`;

            try {
              await github.rest.git.createRef({ owner, repo, ref, sha });
              console.log(`Tag ${tag} created in ${owner}/${repo}`);
            } catch (error) {
              if (error.status === 422) {
                await github.rest.git.updateRef({ owner, repo, ref: `tags/${tag}`, sha, force: true });
                console.log(`Tag ${tag} updated in ${owner}/${repo}`);
              } else {
                throw error;
              }
            }
