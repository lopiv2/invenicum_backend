name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version semantica opcional (ej: 1.2.3)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/lopiv2/invenicum
      FRONTEND_REPOSITORY: lopiv2/Invenicum
      FRONTEND_REF: main
      FRONTEND_SUBPATH: invenicum

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend (publico)
        if: ${{ secrets.FRONTEND_REPO_TOKEN == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ env.FRONTEND_REF }}
          path: frontend-src

      - name: Checkout frontend (privado)
        if: ${{ secrets.FRONTEND_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ env.FRONTEND_REF }}
          path: frontend-src
          token: ${{ secrets.FRONTEND_REPO_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          APP_VERSION="$SHORT_SHA"

          TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:sha-${SHORT_SHA}"

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            APP_VERSION="$INPUT_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_VERSION}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            APP_VERSION="$TAG_VERSION"
            TAGS="${TAGS},${IMAGE_NAME}:${TAG_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.selfhosted
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-contexts: |
            frontend=./frontend-src/${{ env.FRONTEND_SUBPATH }}
          build-args: |
            API_URL=/api/v1
            APP_VERSION=${{ steps.vars.outputs.app_version }}
