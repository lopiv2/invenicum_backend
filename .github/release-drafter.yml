name-template: 'Release $NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
  - title: '🐛 Fixes'
    labels:
      - 'bug'
  - title: '🧰 Chore & Maintenance'
    labels:
      - 'chore'
      - 'ci'
      - 'build'
template: |
  ## What's Changed

  $CHANGES

  ---
  _Generated by Release Drafter_
