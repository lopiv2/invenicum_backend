services:
  db:
    image: mysql:8.4
    container_name: invenicum_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

  invenicum:
    image: invenicum/invenicum:latest
    container_name: invenicum
    restart: unless-stopped
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production

      # Base de datos (DB_HOST apunta al servicio "db" de este compose)
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}

      # Servidor
      PORT: ${PORT:-3000}
      BASE_URL: ${BASE_URL}

      # JWT (secreto obligatorio)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      # Imágenes
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-uploads/inventory}

      # GitHub OAuth (secreto obligatorio)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
      - uploads_data:/app/uploads/inventory
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             node src/app.js"

volumes:
  db_data:
  backend_node_modules:
  uploads_data:
